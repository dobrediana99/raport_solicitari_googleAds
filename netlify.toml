[build]
  command = "npm ci --prefix web && npm run build"
  publish = "web/dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/report"
  to = "/.netlify/functions/report"
  status = 200

[[redirects]]
  from = "/api/export/excel"
  to = "/.netlify/functions/export-excel"
  status = 200

[[redirects]]
  from = "/api/send-test"
  to = "/.netlify/functions/send-test"
  status = 200
